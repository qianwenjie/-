    // 浮点精度修正（保留1位小数）
    function round(n) { return Math.round(n * 10) / 10; }

    // 计算已批阅总得分
    function calcGotScore() {
        let total = 0;
        questions.forEach(q => {
            if (q.gotScore !== null && q.gotScore !== undefined) {
                total += q.gotScore;
            }
        });
        return round(total);
    }

    // 将批阅结果保存到 sessionStorage
    function saveGradingResult(studentId, score) {
        const key = 'gradingResults';
        const results = JSON.parse(sessionStorage.getItem(key) || '{}');
        results[studentId] = { score: score, status: 'graded', time: new Date().toISOString() };
        sessionStorage.setItem(key, JSON.stringify(results));
    }

    // 检查是否所有简答题已评分
    function getUngradedEssays() {
        const ungraded = [];
        questions.forEach(q => {
            if (q.type === 'essay' && (q.gotScore === null || q.gotScore === undefined)) {
                ungraded.push(`第${q.num}题`);
            } else if (q.type === 'composite') {
                q.subQuestions.forEach(sq => {
                    if (sq.type === 'essay' && (sq.gotScore === null || sq.gotScore === undefined)) {
                        ungraded.push(`第${q.num}题-第${sq.num}小题`);
                    }
                });
            }
        });
        return ungraded;
    }

    // 提交批阅
    function submitGrading() {
        // 检查未评分的简答题
        const ungraded = getUngradedEssays();
        if (ungraded.length > 0) {
            alert(`还有 ${ungraded.length} 道主观题未评分，请完成后再提交：\n\n${ungraded.join('、')}`);
            // 滚动到第一道未评分题目
            const firstId = questions.find(q => q.type === 'essay' && q.gotScore === null)?.id
                || (() => { for (const q of questions) { if (q.type === 'composite') { const sq = q.subQuestions.find(s => s.type === 'essay' && s.gotScore === null); if (sq) return sq.id; } } return null; })();
            if (firstId) {
                const el = document.getElementById('question-' + firstId);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            return;
        }

        const gotScore = calcGotScore();
        const totalScore = questions.reduce((sum, q) => sum + q.score, 0);

        // 更新统计
        gradingStats.graded++;
        gradingStats.remaining = Math.max(0, gradingStats.remaining - 1);

        // 将批阅结果写入 sessionStorage，供考生列表页读取
        saveGradingResult(currentStudentId, gotScore);

        if (autoNextEnabled) {
            // 尝试加载下一份
            gradingQueueIndex++;
            if (gradingQueueIndex < gradingQueue.length) {
                const next = gradingQueue[gradingQueueIndex];
                showSubmitToast(gotScore, totalScore, next.name);
                // 模拟加载下一考生（延迟后刷新页面数据）
                setTimeout(() => {
                    currentStudentId = next.id;
                    loadMockData();
                    renderStudentInfoBar();
                    renderQuestionNav();
                    renderPaper();
                    updateStats();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 800);
            } else {
                alert(`批阅已提交！得分：${gotScore}/${totalScore}\n\n所有考生已批阅完毕！`);
                history.back();
            }
        } else {
            alert(`批阅已提交！得分：${gotScore}/${totalScore}`);
            history.back();
        }
    }

    // 提交成功 toast 提示
    function showSubmitToast(gotScore, totalScore, nextName) {
        const toast = document.createElement('div');
        toast.className = 'fixed top-16 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-xl shadow-xl z-[10000] flex items-center gap-3 text-sm';
        toast.innerHTML = `<i class="fas fa-check-circle text-lg"></i><div><span class="font-semibold">提交成功！</span> 得分 ${gotScore}/${totalScore}，正在加载 <span class="font-semibold">${nextName}</span> 的答卷...</div>`;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.4s'; setTimeout(() => toast.remove(), 400); }, 2000);
    }

    // 切换上/下一位学生（原型模拟）
    function navigateStudent(direction) {
        if (direction === 'prev') {
            if (gradingQueueIndex <= 0) { alert('已是第一位考生'); return; }
            gradingQueueIndex--;
        } else {
            if (gradingQueueIndex >= gradingQueue.length - 1) { alert('已是最后一位考生'); return; }
            gradingQueueIndex++;
        }
        const target = gradingQueue[gradingQueueIndex];
        currentStudentId = target.id;
        loadMockData();
        if (examStatus === 'completed') assignAllEssayScores();
        renderStudentInfoBar();
        renderQuestionNav();
        renderPaper();
        updateStats();
        if (examStatus === 'completed') renderAnalysisSidebar();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 更新统计（统计栏已移除，保留函数签名供调用链兼容）
    function updateStats() {}

    // 导航筛选
    function filterNav(filter) {
        navFilter = filter;
        document.querySelectorAll('.nav-filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.nf === filter) btn.classList.add('active');
        });
        renderQuestionNav();
    }

    // 渲染题目导航（按题型分组 + 显示得分）
    function renderQuestionNav() {
        const nav = document.getElementById('questionNav');
        // 更新总分
        const totalPaperScore = questions.reduce((s, q) => s + q.score, 0);
        document.getElementById('navTotalScore').textContent = totalPaperScore;
        // 按题型分组，每道题作为整体归入自身题型（复合题不拆子题）
        const grouped = {};
        questions.forEach(q => {
            const t = q.type;
            if (!grouped[t]) grouped[t] = [];
            grouped[t].push(q);
        });

        // 复合题得分：汇总子题得分
        function getCompositeScore(q) {
            let got = 0, hasNull = false;
            q.subQuestions.forEach(sq => { if (sq.gotScore !== null) got += sq.gotScore; else hasNull = true; });
            return hasNull ? null : round(got);
        }

        // 筛选未批阅
        if (navFilter === 'pending') {
            Object.keys(grouped).forEach(t => {
                grouped[t] = grouped[t].filter(q => {
                    if (q.type === 'composite') return getCompositeScore(q) === null;
                    return q.gotScore === null;
                });
                if (grouped[t].length === 0) delete grouped[t];
            });
        }

        if (Object.keys(grouped).length === 0) {
            nav.innerHTML = `<div class="text-xs text-gray-400 text-center py-4">无未批阅题目</div>`;
            return;
        }

        // 按 typeConfig 中的顺序渲染
        const typeOrder = ['single','multiple','judge','fill','cloze','essay','composite'];
        let html = '';
        typeOrder.forEach(type => {
            if (!grouped[type]) return;
            const cfg = typeConfig[type];
            html += `<div class="mb-3">
                <div class="text-xs text-gray-400 mb-1.5">${cfg.name}</div>
                <div class="flex flex-wrap gap-1.5">`;

            grouped[type].forEach(q => {
                let got, total;
                if (q.type === 'composite') {
                    got = getCompositeScore(q);
                    total = q.score;
                } else {
                    got = q.gotScore;
                    total = q.score;
                }
                const scoreText = got === null ? '—' : (got === 0 ? '+0' : '+' + got);
                const scoreCls = got === null ? 's-pending' : (got === total ? 's-full' : (got === 0 ? 's-zero' : 's-partial'));
                html += `<div class="q-card" onclick="scrollToQuestion('${q.id}')" title="第${q.num}题 ${got !== null ? got + '/' + total + '分' : '待批阅'}">
                    <span class="q-num">${q.num}</span>
                    <span class="q-score ${scoreCls}">${scoreText}</span>
                </div>`;
            });

            html += `</div></div>`;
        });

        nav.innerHTML = html;
    }

    // 获取题目状态
    function getQuestionStatus(q) {
        if (q.type === 'essay') {
            return q.gotScore === null ? 'pending' : (q.gotScore >= q.score * 0.6 ? 'correct' : 'partial');
        }
        if (q.gotScore === null) return 'pending';
        if (q.gotScore === q.score) return 'correct';
        if (q.gotScore === 0) return 'wrong';
        return 'partial';
    }

    // 滚动到题目
    function scrollToQuestion(id) {
        const el = document.getElementById('question-' + id);
        if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            el.classList.add('highlight');
            setTimeout(() => el.classList.remove('highlight'), 800);
        }
    }

    // 渲染试卷（按题型分组）
    function renderPaper() {
        const container = document.getElementById('questionList');
        // 按题型分组，保持原始顺序
        const groups = [];
        const typeOrder = [];
        questions.forEach(q => {
            if (typeOrder.length === 0 || typeOrder[typeOrder.length - 1] !== q.type) {
                typeOrder.push(q.type);
                groups.push({ type: q.type, questions: [q] });
            } else {
                groups[groups.length - 1].questions.push(q);
            }
        });

        const sectionLabels = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];

        container.innerHTML = groups.map((group, gi) => {
            const cfg = typeConfig[group.type];
            const totalScore = group.questions.reduce((s, q) => s + q.score, 0);
            const count = group.questions.length;
            // 计算该组得分
            let gotTotal = 0, hasNull = false;
            group.questions.forEach(q => {
                if (q.type === 'composite') {
                    let sub = 0, subNull = false;
                    q.subQuestions.forEach(sq => { if (sq.gotScore !== null) sub += sq.gotScore; else subNull = true; });
                    if (subNull) hasNull = true; else gotTotal += sub;
                } else {
                    if (q.gotScore !== null) gotTotal += q.gotScore; else hasNull = true;
                }
            });
            const gotText = hasNull ? '--' : round(gotTotal);
            const gotCls = hasNull ? 'text-gray-400' : (gotTotal === totalScore ? 'text-green-600' : (gotTotal === 0 ? 'text-red-500' : 'text-amber-600'));

            const label = sectionLabels[gi] || (gi + 1);
            const perScore = count > 1 ? `每题${group.questions[0].score}分，` : '';

            return `<div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden mb-5">
                <!-- 题型分组标题 -->
                <div class="px-5 py-3 bg-gray-50 border-b border-gray-200 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="text-base font-bold text-gray-800">${label}、${cfg.name}</span>
                        <span class="text-xs text-gray-400">（共${count}题，${perScore}共${totalScore}分）</span>
                    </div>
                    <div class="flex items-center gap-1.5 text-sm">
                        <span class="text-gray-400">得分</span>
                        <span class="font-bold text-red-600">${gotText}</span>
                        <span class="text-gray-300">/</span>
                        <span class="text-gray-500">${totalScore}</span>
                    </div>
                </div>
                <!-- 题目列表 -->
                <div class="divide-y divide-gray-100">
                    ${group.questions.map(q => renderQuestion(q)).join('')}
                </div>
            </div>`;
        }).join('');
    }

    // 渲染单个题目（组内，不再有外层卡片）
    function renderQuestion(q) {
        const isComposite = q.type === 'composite';

        let html = `<div id="question-${q.id}" class="question-item p-5 relative">
            <div class="mb-3">
                <div class="flex items-center space-x-2">
                    <span class="text-sm font-bold text-gray-800">${q.num}.</span>
                    <span class="text-xs text-gray-400">（${q.score}分）</span>
                </div>
                <div class="absolute right-5 top-3">
                    ${!isComposite ? renderScoreStrip(q) : renderCompositeScoreStrip(q)}
                </div>
            </div>
            <div class="text-sm text-gray-700 mb-4 whitespace-pre-wrap leading-relaxed">${q.content}</div>`;

        if (q.type === 'single' || q.type === 'multiple') html += renderChoiceQuestion(q);
        else if (q.type === 'judge') html += renderJudgeQuestion(q);
        else if (q.type === 'fill') html += renderFillQuestion(q);
        else if (q.type === 'cloze') html += renderClozeQuestion(q);
        else if (q.type === 'essay') html += renderEssayQuestion(q);
        else if (q.type === 'composite') html += renderCompositeQuestion(q);

        html += `</div>`;
        return html;
    }

    // 得分条：显示 +得分
    function renderScoreStrip(q) {
        if (q.gotScore === null) {
            return `<div class="score-strip ungraded"><i class="fas fa-pen text-xs mr-1"></i>待批</div>`;
        }
        const got = round(q.gotScore);
        return `<div class="score-strip">+${got}</div>`;
    }

    // 复合题总分条
    function renderCompositeScoreStrip(q) {
        let total = 0, got = 0, hasNull = false;
        q.subQuestions.forEach(sq => { total += sq.score; if (sq.gotScore !== null) got += sq.gotScore; else hasNull = true; });
        if (hasNull) return `<div class="score-strip ungraded"><i class="fas fa-pen text-xs mr-1"></i>批阅中</div>`;
        got = round(got);
        return `<div class="score-strip">+${got}</div>`;
    }

    // 选择题渲染
    function renderChoiceQuestion(q) {
        const isMulti = q.type === 'multiple';
        const correctArr = isMulti ? q.correct : [q.correct];
        const answerArr = isMulti ? q.answer : [q.answer];

        const allCorrect = correctArr.length === answerArr.length && correctArr.every(c => answerArr.includes(c));

        let html = '<div class="space-y-2 mb-3">';
        q.options.forEach(opt => {
            const isSelected = answerArr.includes(opt.l);
            let bg = 'bg-white border-gray-200';
            let circleCls = 'border-gray-300';

            if (isSelected) {
                if (isMulti) {
                    // 多选：全对才绿，有错全红
                    if (allCorrect) {
                        bg = 'bg-green-50 border-green-300';
                        circleCls = 'bg-green-600 text-white border-green-600';
                    } else {
                        bg = 'bg-red-50 border-red-300';
                        circleCls = 'bg-red-500 text-white border-red-500';
                    }
                } else {
                    if (correctArr.includes(opt.l)) {
                        bg = 'bg-green-50 border-green-300';
                        circleCls = 'bg-green-600 text-white border-green-600';
                    } else {
                        bg = 'bg-red-50 border-red-300';
                        circleCls = 'bg-red-500 text-white border-red-500';
                    }
                }
            }

            html += `<div class="flex items-center p-2 rounded border ${bg}">
                <span class="w-6 h-6 rounded-full border flex items-center justify-center text-xs mr-2 ${circleCls}">${opt.l}</span>
                <span class="text-sm text-gray-700 flex-1">${opt.t}</span>
            </div>`;
        });
        html += '</div>';
        {
            const correctLabel = correctArr.join('、');
            const answerLabel = answerArr.join('、');
            html += `<div class="flex items-center gap-2 text-xs mt-2 mb-3 px-1">
                <span class="text-gray-400">学生选择:</span>
                <span class="font-medium ${allCorrect ? 'text-green-600' : 'text-red-500'}">${answerLabel}</span>
                ${allCorrect ? '<i class="fas fa-check-circle text-green-500"></i>' : '<i class="fas fa-times-circle text-red-500"></i>'}
                <span class="text-gray-300">|</span>
                <span class="text-gray-400">正确答案:</span>
                <span class="font-medium text-green-600">${correctLabel}</span>
            </div>`;
        }
        html += renderExplanation(q);
        return html;
    }

    // 判断题渲染
    function renderJudgeQuestion(q) {
        const isCorrectAnswer = q.answer === q.correct;
        let html = '<div class="space-y-2 mb-3">';

        [true, false].forEach(val => {
            const label = val ? '正确' : '错误';
            const isSelected = q.answer === val;
            let cls = 'border-gray-200 bg-white';
            let circleCls = 'border-gray-300';

            if (isSelected) {
                if (isCorrectAnswer) {
                    cls = 'border-green-300 bg-green-50';
                    circleCls = 'bg-green-600 text-white border-green-600';
                } else {
                    cls = 'border-red-300 bg-red-50';
                    circleCls = 'bg-red-500 text-white border-red-500';
                }
            }

            html += `<div class="flex items-center p-2 rounded border ${cls}">
                <span class="w-6 h-6 rounded-full border flex items-center justify-center text-xs mr-2 ${circleCls}">${val ? 'T' : 'F'}</span>
                <span class="text-sm text-gray-700 flex-1">${label}</span>
            </div>`;
        });

        html += '</div>';
        {
            const correctLabel = q.correct ? '正确' : '错误';
            const answerLabel = q.answer ? '正确' : '错误';
            const isRight = q.answer === q.correct;
            html += `<div class="flex items-center gap-2 text-xs mt-2 mb-3 px-1">
                <span class="text-gray-400">学生选择:</span>
                <span class="font-medium ${isRight ? 'text-green-600' : 'text-red-500'}">${answerLabel}</span>
                ${isRight ? '<i class="fas fa-check-circle text-green-500"></i>' : '<i class="fas fa-times-circle text-red-500"></i>'}
                <span class="text-gray-300">|</span>
                <span class="text-gray-400">正确答案:</span>
                <span class="font-medium text-green-600">${correctLabel}</span>
            </div>`;
        }
        html += renderExplanation(q);
        return html;
    }

    // 填空题渲染（支持多空，答案成组展示）
    function renderFillQuestion(q) {
        const blanks = q.blanks || [{ num: 1, correct: q.correct, answer: q.answer }];
        let html = `<div class="mb-3 rounded border border-gray-200 overflow-hidden">`;
        blanks.forEach((b, i) => {
            const isCorrect = b.answer.toLowerCase() === b.correct.toLowerCase();
            const borderTop = i > 0 ? 'border-t border-gray-200' : '';
            html += `<div class="${borderTop}">
                <div class="flex items-center gap-3 px-3 py-2 ${isCorrect ? 'bg-green-50' : 'bg-red-50'}">
                    <span class="text-xs text-gray-400 shrink-0">第${b.num}空</span>
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-gray-400">学生:</span>
                        <span class="text-sm font-medium ${isCorrect ? 'text-green-700' : 'text-red-600'}">${b.answer}</span>
                        ${isCorrect
                            ? '<i class="fas fa-check text-green-500 text-xs"></i>'
                            : `<i class="fas fa-times text-red-500 text-xs"></i>
                               <span class="text-xs text-gray-300 mx-1">|</span>
                               <span class="text-xs text-gray-400">正确:</span>
                               <span class="text-sm font-medium text-green-700">${b.correct}</span>`}
                    </div>
                </div>
            </div>`;
        });
        html += `</div>`;
        html += renderExplanation(q);
        return html;
    }

    // 完形填空渲染
    function renderClozeQuestion(q) {
        let html = '<div class="space-y-3 mb-3">';
        q.blanks.forEach(blank => {
            const isCorrect = blank.answer === blank.correct;
            html += `<div class="p-3 rounded border border-gray-200 bg-white">
                <div class="text-xs text-gray-500 mb-2">第${blank.num}空</div>
                <div class="flex flex-wrap gap-2">`;

            blank.options.forEach(opt => {
                const isSelected = opt.l === blank.answer;
                let cls = 'border-gray-200 bg-white';
                if (isSelected) {
                    cls = isCorrect ? 'border-green-300 bg-green-100' : 'border-red-300 bg-red-100';
                }

                html += `<span class="px-2 py-1 text-xs rounded border ${cls} ${isSelected ? 'font-medium' : ''}">
                    ${opt.l}. ${opt.t}
                </span>`;
            });

            html += `</div>
                <div class="flex items-center gap-2 text-xs mt-2 px-1">
                    <span class="text-gray-400">学生选择:</span>
                    <span class="font-medium ${isCorrect ? 'text-green-600' : 'text-red-500'}">${blank.answer}</span>
                    ${isCorrect ? '<i class="fas fa-check-circle text-green-500"></i>' : '<i class="fas fa-times-circle text-red-500"></i>'}
                    <span class="text-gray-300">|</span>
                    <span class="text-gray-400">正确答案:</span>
                    <span class="font-medium text-green-600">${blank.correct}</span>
                </div>
            </div>`;
        });
        html += '</div>';
        html += renderExplanation(q);
        return html;
    }

    // 简答题渲染（内联批阅 + AI评语）
    function renderEssayQuestion(q) {
        const isGraded = q.gotScore !== null;
        const data = gradingData[q.id] || { score: null, comment: '', aiScore: null, aiComment: '' };

        // 附件渲染
        const attachHtml = (q.attachments && q.attachments.length > 0) ? `
            <div class="mt-3 pt-3 border-t border-blue-100">
                <div class="text-xs font-medium text-gray-500 mb-2"><i class="fas fa-paperclip mr-1"></i>附件 (${q.attachments.length})</div>
                <div class="space-y-2">
                    ${q.attachments.map(a => {
                        const iconMap = { pdf: 'fa-file-pdf text-red-500', doc: 'fa-file-word text-blue-500', image: 'fa-file-image text-green-500', excel: 'fa-file-excel text-green-600' };
                        const icon = iconMap[a.type] || 'fa-file text-gray-400';
                        return `<div class="flex items-center justify-between p-2.5 bg-gray-50 rounded-lg border border-gray-100">
                            <div class="flex items-center gap-2 min-w-0">
                                <i class="fas ${icon} text-base flex-shrink-0"></i>
                                <div class="min-w-0">
                                    <div class="text-xs font-medium text-gray-700 truncate">${a.name}</div>
                                    <div class="text-xs text-gray-400">${a.size}</div>
                                </div>
                            </div>
                            <div class="flex items-center gap-1.5 flex-shrink-0 ml-2">
                                <button onclick="previewAttachment('${a.name}','${a.type}','${a.size}')" class="px-2 py-1 text-xs text-blue-600 bg-white border border-blue-200 rounded hover:bg-blue-50 transition" title="预览"><i class="fas fa-eye mr-0.5"></i>预览</button>
                                <button onclick="downloadAttachment('${a.name}','${a.size}')" class="px-2 py-1 text-xs text-gray-600 bg-white border border-gray-200 rounded hover:bg-gray-50 transition" title="下载"><i class="fas fa-download mr-0.5"></i>下载</button>
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>` : '';

        let html = `<div class="mb-4 grid grid-cols-2 gap-3">
            <div class="p-4 rounded-lg border border-blue-200 bg-blue-50/30">
                <div class="text-xs font-medium text-blue-600 mb-2"><i class="fas fa-user-edit mr-1"></i>学生答案</div>
                <div class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">${q.answer}</div>
                ${attachHtml}
            </div>
            <div class="p-4 rounded-lg border border-green-200 bg-green-50/30">
                <div class="text-xs font-medium text-green-600 mb-2"><i class="fas fa-check-circle mr-1"></i>参考答案</div>
                <div class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">${q.correct}</div>
            </div>
        </div>`;

        // 内联批阅面板
        if (examStatus === 'completed') {
            // 只读模式：显示评分和评语
            html += `<div class="grading-inline p-4" id="grading-${q.id}">
                <div class="gi-header flex items-center justify-between px-3 py-2 -mx-4 -mt-4 mb-3">
                    <span class="text-sm font-medium text-blue-800"><i class="fas fa-pen-fancy mr-1"></i>教师批阅</span>
                    <span class="text-xs text-green-600 bg-green-100 px-2 py-0.5 rounded">已评分</span>
                </div>
                <div class="flex items-center gap-3 mb-2">
                    <span class="text-sm text-gray-600">评分：</span>
                    <span class="font-bold text-lg text-red-600">${q.gotScore}</span>
                    <span class="text-gray-400 font-medium">/ ${q.score}</span>
                    <span class="ml-2 text-xs px-2 py-0.5 rounded ${q.gotScore >= q.score ? 'bg-green-100 text-green-700' : q.gotScore >= q.score * 0.6 ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700'}">${q.gotScore >= q.score ? '满分' : Math.round(q.gotScore / q.score * 100) + '%'}</span>
                </div>
                ${data.comment ? `<div class="text-sm"><span class="text-gray-500">评语：</span><span class="text-gray-700">${data.comment}</span></div>` : ''}
            </div>`;
        } else {
            // 可编辑模式（原有逻辑）
            html += `<div class="grading-inline p-4" id="grading-${q.id}">
                <div class="gi-header flex items-center justify-between px-3 py-2 -mx-4 -mt-4 mb-3">
                    <span class="text-sm font-medium text-blue-800"><i class="fas fa-pen-fancy mr-1"></i>教师批阅</span>
                    ${isGraded ? '<span class="text-xs text-green-600 bg-green-100 px-2 py-0.5 rounded">已评分</span>' : '<span class="text-xs text-amber-600 bg-amber-100 px-2 py-0.5 rounded">待评分</span>'}
                </div>
                <div class="flex items-center gap-3 mb-3">
                    <div class="flex items-center gap-2">
                        <span class="text-sm text-gray-600">评分：</span>
                        <input type="number" min="0" max="${q.score}" step="0.5" value="${isGraded ? q.gotScore : ''}"
                               onchange="inlineSaveScore('${q.id}', this.value, ${q.score})"
                               class="w-16 px-2 py-1.5 text-center font-bold text-lg border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none">
                        <span class="text-gray-400 font-medium">/ ${q.score}</span>
                    </div>
                    <div class="flex gap-1.5 ml-2">
                        <button onclick="inlineSetScore('${q.id}', ${q.score}, 100)" class="px-2.5 py-1 text-xs font-medium bg-green-100 text-green-700 rounded-md hover:bg-green-200 transition">满分</button>
                        <button onclick="inlineSetScore('${q.id}', ${q.score}, 80)" class="px-2.5 py-1 text-xs font-medium bg-blue-100 text-blue-700 rounded-md hover:bg-blue-200 transition">80%</button>
                        <button onclick="inlineSetScore('${q.id}', ${q.score}, 60)" class="px-2.5 py-1 text-xs font-medium bg-yellow-100 text-yellow-700 rounded-md hover:bg-yellow-200 transition">60%</button>
                        <button onclick="inlineSetScore('${q.id}', ${q.score}, 0)" class="px-2.5 py-1 text-xs font-medium bg-red-100 text-red-700 rounded-md hover:bg-red-200 transition">0分</button>
                    </div>
                    <div class="w-px h-6 bg-gray-200 mx-1"></div>
                    <button onclick="getAIScore('${q.id}', ${q.score})" class="ai-btn">
                        <i class="fas fa-robot"></i>AI评分
                    </button>
                </div>
                <div id="ai-score-${q.id}" class="mb-3 ${data.aiScore !== null ? '' : 'hidden'}">
                    <div class="p-2.5 rounded-lg border border-blue-200 bg-blue-50 text-xs">${data.aiScore !== null ? renderAIScoreHTML(q.id, data, q.score) : ''}</div>
                </div>
                <div class="mb-2">
                    <span class="text-sm text-gray-600">评语：</span>
                    <textarea rows="2" placeholder="输入评语..." onchange="inlineSaveComment('${q.id}', this.value)"
                        class="mt-1 w-full px-3 py-2 text-sm border border-gray-300 rounded-lg resize-none focus:ring-2 focus:ring-blue-400 focus:outline-none">${data.comment || ''}</textarea>
                </div>
                <div class="flex flex-wrap gap-1.5 mb-3">
                    ${quickPhrases.map(p => `<button onclick="inlineAddComment('${q.id}', '${p}')" class="px-2 py-1 text-xs bg-gray-100 text-gray-600 rounded hover:bg-gray-200 transition">${p}</button>`).join('')}
                </div>
                <div class="flex items-center gap-2 mb-2">
                    <button onclick="getAIComment('${q.id}', ${q.score})" class="ai-btn">
                        <i class="fas fa-magic"></i>AI评语
                    </button>
                    <span id="ai-comment-hint-${q.id}" class="text-xs text-gray-400">${data.aiComment ? '点击重新生成' : '点击生成AI评语'}</span>
                </div>
                <div id="ai-comment-${q.id}" class="${data.aiComment ? '' : 'hidden'}">
                    <div class="p-2.5 rounded-lg border border-blue-200 bg-blue-50 text-xs">
                        <div class="text-gray-600 leading-relaxed">${data.aiComment || ''}</div>
                        ${data.aiComment ? `<div class="mt-2 pt-2 border-t border-blue-200 flex justify-end">
                            <button onclick="adoptAIComment('${q.id}')" class="text-xs px-2.5 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 transition"><i class="fas fa-check mr-1"></i>采纳评语</button>
                        </div>` : ''}
                    </div>
                </div>
            </div>`;
        }

        return html;
    }

    // 复合题渲染
    function renderCompositeQuestion(q) {
        let totalScore = 0, gotScore = 0, hasUngraded = false;
        q.subQuestions.forEach(sq => {
            totalScore += sq.score;
            if (sq.gotScore !== null) gotScore += sq.gotScore;
            else hasUngraded = true;
        });
        gotScore = round(gotScore);

        let html = `<div class="text-xs text-gray-500 mb-3">本题共${q.subQuestions.length}小题，总分${totalScore}分${hasUngraded ? '' : `，得分 <span class="font-bold ${gotScore >= totalScore * 0.6 ? 'text-green-600' : 'text-red-600'}">${gotScore}分</span>`}</div>`;
        html += '<div class="space-y-4 border-t border-gray-100 pt-4">';

        q.subQuestions.forEach(sq => {
            const cfg = typeConfig[sq.type];
            html += `<div id="question-${sq.id}" class="question-item p-4 rounded-lg border border-gray-200 bg-gray-50 relative">
                <div class="mb-3">
                    <div class="flex items-center space-x-2">
                        <span class="text-sm font-bold text-gray-700">第${sq.num}题</span>
                        <span class="px-1.5 py-0.5 text-xs rounded bg-gray-100 text-gray-500">${cfg.name}</span>
                        <span class="text-xs text-gray-400">（${sq.score}分）</span>
                    </div>
                    <div class="absolute right-4 top-3">
                        ${renderScoreStrip(sq)}
                    </div>
                </div>
                <div class="text-sm text-gray-700 mb-3">${sq.content}</div>`;

            if (sq.type === 'single' || sq.type === 'multiple') html += renderChoiceQuestion(sq);
            else if (sq.type === 'judge') html += renderJudgeQuestion(sq);
            else if (sq.type === 'fill') html += renderFillQuestion(sq);
            else if (sq.type === 'essay') html += renderEssayQuestion(sq);

            html += '</div>';
        });

        html += '</div>';
        return html;
    }

    // 解析渲染
    function renderExplanation(q) {
        if (!q.explanation) return '';
        return `<div class="p-2 bg-gray-50 rounded border border-gray-200 mt-2">
            <div class="text-xs text-gray-500 mb-1"><i class="fas fa-lightbulb mr-1"></i>解析</div>
            <div class="text-xs text-gray-600">${q.explanation}</div>
        </div>`;
    }

    // 内联评分 - 设置分数
    function inlineSetScore(qId, maxScore, percent) {
        const score = Math.round(maxScore * percent / 100 * 2) / 2;
        inlineSaveScore(qId, score, maxScore);
    }

    // 内联评分 - 保存分数
    function inlineSaveScore(qId, value, maxScore) {
        let score = Math.min(Math.max(parseFloat(value) || 0, 0), maxScore);
        score = Math.round(score * 2) / 2;
        if (!gradingData[qId]) gradingData[qId] = { score: null, comment: '', aiScore: null, aiComment: '' };
        gradingData[qId].score = score;

        // 更新题目数据
        const updateQ = (q) => { if (q.id === qId) { q.gotScore = score; return true; } return false; };
        questions.forEach(q => { if (!updateQ(q) && q.subQuestions) q.subQuestions.forEach(sq => updateQ(sq)); });

        renderQuestionNav();
        renderPaper();
    }

    // 内联评分 - 保存评语
    function inlineSaveComment(qId, text) {
        if (!gradingData[qId]) gradingData[qId] = { score: null, comment: '', aiScore: null, aiComment: '' };
        gradingData[qId].comment = text;
    }

    // 内联评分 - 添加快捷评语
    function inlineAddComment(qId, text) {
        if (!gradingData[qId]) gradingData[qId] = { score: null, comment: '', aiScore: null, aiComment: '' };
        const data = gradingData[qId];
        data.comment = data.comment ? data.comment + '；' + text : text;
        // 直接更新textarea
        const panel = document.getElementById('grading-' + qId);
        if (panel) {
            const ta = panel.querySelector('textarea');
            if (ta) ta.value = data.comment;
        }
    }

    // AI评语（模拟）
    // AI评分（仅返回分数）
    function getAIScore(qId, maxScore) {
        const el = document.getElementById('ai-score-' + qId);
        el.classList.remove('hidden');
        const inner = el.querySelector('div') || el;
        inner.innerHTML = '<i class="fas fa-spinner fa-spin mr-1 text-blue-500"></i><span class="text-blue-500">AI正在评分...</span>';

        setTimeout(() => {
            // 生成整数或.5的分数
            const raw = maxScore * 0.65 + Math.random() * maxScore * 0.25;
            const aiScore = Math.round(raw * 2) / 2;
            const matchRate = Math.round(aiScore / maxScore * 100);
            // 生成评分理由
            const reasons = [];
            if (matchRate >= 85) {
                reasons.push('学生答案与参考答案高度吻合，核心知识点覆盖完整');
                reasons.push(matchRate >= 95 ? '表述准确，逻辑清晰，几乎无遗漏' : '个别细节表述可进一步完善');
            } else if (matchRate >= 60) {
                reasons.push('学生答案覆盖了部分核心知识点，但存在遗漏');
                reasons.push('建议补充对关键概念的深入阐述');
            } else {
                reasons.push('学生答案与参考答案匹配度较低，关键知识点缺失较多');
                reasons.push('建议重新审阅参考答案，补充核心论点');
            }
            if (!gradingData[qId]) gradingData[qId] = { score: null, comment: '', aiScore: null, aiComment: '' };
            gradingData[qId].aiScore = aiScore;
            gradingData[qId].aiMatchRate = matchRate;
            gradingData[qId].aiReasons = reasons;

            renderAIScoreResult(qId, maxScore);
            // 自动填入评分输入框
            inlineSaveScore(qId, aiScore, maxScore);
        }, 800);
    }

    // AI评语（独立区域，不影响评语）
    function getAIComment(qId, maxScore) {
        const el = document.getElementById('ai-comment-' + qId);
        el.classList.remove('hidden');
        el.querySelector('div').innerHTML = '<i class="fas fa-spinner fa-spin mr-1 text-blue-500"></i><span class="text-blue-500">AI正在生成评语...</span>';
        const hint = document.getElementById('ai-comment-hint-' + qId);
        if (hint) hint.textContent = '正在生成...';

        setTimeout(() => {
            const comments = [
                '回答涵盖了主要知识点，但缺少对内存占用差异的说明。建议补充可变与不可变对象在内存管理上的区别。',
                '答案基本正确，表述清晰。但仅提到了语法层面的区别，未涉及性能和使用场景的差异。',
                '理解到位，逻辑清晰。可进一步补充元组作为字典键的特性以及列表推导式的应用。'
            ];
            const aiComment = comments[Math.floor(Math.random() * comments.length)];
            if (!gradingData[qId]) gradingData[qId] = { score: null, comment: '', aiScore: null, aiComment: '' };
            gradingData[qId].aiComment = aiComment;

            el.querySelector('div').innerHTML = `<div class="text-gray-600 leading-relaxed">${aiComment}</div>
                <div class="mt-2 pt-2 border-t border-blue-200 flex justify-end">
                    <button onclick="adoptAIComment('${qId}')" class="text-xs px-2.5 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 transition"><i class="fas fa-check mr-1"></i>采纳评语</button>
                </div>`;
            if (hint) hint.textContent = '点击重新生成';
        }, 1200);
    }

    // AI评分HTML生成（纯字符串，供模板和动态渲染共用）
    function renderAIScoreHTML(qId, data, maxScore) {
        const matchRate = data.aiMatchRate || Math.round(data.aiScore / maxScore * 100);
        const reasons = data.aiReasons || ['AI评分依据暂无详细说明'];
        const barColor = matchRate >= 80 ? '#22c55e' : matchRate >= 60 ? '#f59e0b' : '#ef4444';
        return `<div class="flex items-center gap-3 mb-2">
            <span class="font-medium text-blue-700"><i class="fas fa-robot mr-1"></i>AI评分：<span class="text-sm font-bold">${data.aiScore}/${maxScore}分</span></span>
            <span class="text-gray-300">|</span>
            <span class="text-gray-500">匹配度</span>
            <div class="flex items-center gap-1.5 flex-1 max-w-[140px]">
                <div class="flex-1 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                    <div class="h-full rounded-full transition-all" style="width:${matchRate}%;background:${barColor}"></div>
                </div>
                <span class="text-xs font-bold" style="color:${barColor}">${matchRate}%</span>
            </div>
            <button onclick="clearAIScore('${qId}', ${maxScore})" class="ml-auto text-xs px-2 py-0.5 bg-gray-100 text-gray-500 rounded hover:bg-gray-200 transition">取消</button>
        </div>
        <div class="text-gray-500 leading-relaxed">${reasons.map(r => '<div class="flex items-start gap-1"><span class="text-blue-400 mt-px">•</span><span>' + r + '</span></div>').join('')}</div>`;
    }

    // 渲染AI评分结果到DOM
    function renderAIScoreResult(qId, maxScore) {
        const el = document.getElementById('ai-score-' + qId);
        const data = gradingData[qId] || {};
        if (data.aiScore !== null && data.aiScore !== undefined) {
            el.classList.remove('hidden');
            el.querySelector('div').innerHTML = renderAIScoreHTML(qId, data, maxScore);
        }
    }

    // 取消AI评分
    function clearAIScore(qId, maxScore) {
        const data = gradingData[qId];
        if (!data) return;
        if (data.score === data.aiScore) {
            data.score = null;
            const updateQ = (q) => { if (q.id === qId) { q.gotScore = null; return true; } return false; };
            questions.forEach(q => { if (!updateQ(q) && q.subQuestions) q.subQuestions.forEach(sq => updateQ(sq)); });
        }
        data.aiScore = null;
        const el = document.getElementById('ai-score-' + qId);
        if (el) { el.classList.add('hidden'); el.querySelector('div').innerHTML = ''; }
        renderQuestionNav();
        renderPaper();
    }

    // 采纳AI评语到评语
    function adoptAIComment(qId) {
        const data = gradingData[qId];
        if (!data || !data.aiComment) return;
        data.comment = data.aiComment;
        const panel = document.getElementById('grading-' + qId);
        if (panel) {
            const ta = panel.querySelector('textarea');
            if (ta) ta.value = data.aiComment;
        }
        // 按钮变为已采纳
        const el = document.getElementById('ai-comment-' + qId);
        if (el) {
            const btnWrap = el.querySelector('.flex.justify-end');
            if (btnWrap) btnWrap.innerHTML = '<span class="text-xs px-2.5 py-1 bg-green-100 text-green-600 rounded"><i class="fas fa-check mr-1"></i>已采纳到评语</span>';
        }
    }

    // ===== 附件预览与下载 =====
    function previewAttachment(name, type, size) {
        const modal = document.getElementById('attachModal');
        const title = document.getElementById('attachModalTitle');
        const body = document.getElementById('attachModalBody');
        title.textContent = name;

        if (type === 'image') {
            // 图片：模拟显示占位图
            body.innerHTML = `
                <div class="text-center">
                    <div class="inline-block bg-gray-100 rounded-lg p-8 mb-4" style="min-width:400px;min-height:300px;display:flex;align-items:center;justify-content:center;">
                        <div class="text-center">
                            <i class="fas fa-image text-5xl text-gray-300 mb-3"></i>
                            <div class="text-sm text-gray-500">${name}</div>
                            <div class="text-xs text-gray-400 mt-1">${size}</div>
                        </div>
                    </div>
                    <div class="text-xs text-gray-400">原型阶段：图片预览模拟</div>
                </div>`;
        } else if (type === 'pdf') {
            body.innerHTML = `
                <div class="border border-gray-200 rounded-lg overflow-hidden">
                    <div class="bg-gray-50 px-4 py-3 flex items-center gap-2 border-b border-gray-200">
                        <i class="fas fa-file-pdf text-red-500"></i>
                        <span class="text-sm font-medium text-gray-700">${name}</span>
                        <span class="text-xs text-gray-400 ml-auto">${size}</span>
                    </div>
                    <div class="p-8 text-center" style="min-height:320px;display:flex;align-items:center;justify-content:center;">
                        <div>
                            <i class="fas fa-file-pdf text-6xl text-red-300 mb-4"></i>
                            <div class="text-sm text-gray-600 mb-1">PDF 文档预览</div>
                            <div class="text-xs text-gray-400 mb-4">原型阶段：实际部署后将嵌入 PDF 阅读器</div>
                            <button onclick="downloadAttachment('${name}','${size}')" class="px-4 py-2 text-sm bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
                                <i class="fas fa-download mr-1"></i>下载查看
                            </button>
                        </div>
                    </div>
                </div>`;
        } else {
            // doc / excel / 其他
            const iconMap = { doc: 'fa-file-word text-blue-500', excel: 'fa-file-excel text-green-600' };
            const colorMap = { doc: 'blue', excel: 'green' };
            const icon = iconMap[type] || 'fa-file text-gray-400';
            const color = colorMap[type] || 'gray';
            body.innerHTML = `
                <div class="border border-gray-200 rounded-lg overflow-hidden">
                    <div class="bg-gray-50 px-4 py-3 flex items-center gap-2 border-b border-gray-200">
                        <i class="fas ${icon}"></i>
                        <span class="text-sm font-medium text-gray-700">${name}</span>
                        <span class="text-xs text-gray-400 ml-auto">${size}</span>
                    </div>
                    <div class="p-8 text-center" style="min-height:320px;display:flex;align-items:center;justify-content:center;">
                        <div>
                            <i class="fas ${icon} text-6xl opacity-40 mb-4"></i>
                            <div class="text-sm text-gray-600 mb-1">文档预览</div>
                            <div class="text-xs text-gray-400 mb-4">原型阶段：实际部署后将支持在线预览</div>
                            <button onclick="downloadAttachment('${name}','${size}')" class="px-4 py-2 text-sm bg-${color}-500 text-white rounded-lg hover:bg-${color}-600 transition">
                                <i class="fas fa-download mr-1"></i>下载查看
                            </button>
                        </div>
                    </div>
                </div>`;
        }

        modal.classList.add('show');
    }

    function closeAttachModal() {
        document.getElementById('attachModal').classList.remove('show');
    }

    function downloadAttachment(name, size) {
        // 模拟下载进度提示
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-6 right-6 bg-gray-800 text-white px-5 py-3 rounded-lg shadow-xl z-[10000] flex items-center gap-3 text-sm';
        toast.innerHTML = `<i class="fas fa-download text-green-400"></i><div><div class="font-medium">开始下载</div><div class="text-xs text-gray-300 mt-0.5">${name} (${size})</div></div>`;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.innerHTML = `<i class="fas fa-check-circle text-green-400"></i><div><div class="font-medium">下载完成</div><div class="text-xs text-gray-300 mt-0.5">${name} (${size})</div></div>`;
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 1500);
        }, 1200);
    }

    // ===== 个人成绩分析 =====
    // 模拟全班成绩数据（原型用）
    function getMockClassScores(myScore) {
        const scores = [92,87,85,83,81,79,78,76,74,72,71,69,67,65,63,60,58,55,52,48,45,40,35];
        if (!scores.includes(myScore)) scores.push(myScore);
        scores.sort((a, b) => b - a);
        return scores;
    }
    // 模拟各题型班级平均得分率
    function getMockClassTypeAvg() {
        return { single: 82, multiple: 65, judge: 78, fill: 60, cloze: 55, essay: 58, composite: 52 };
    }

    function renderAnalysisSidebar() {
        const s = currentStudent;
        const totalScore = questions.reduce((sum, q) => sum + q.score, 0);
        const gotScore = calcGotScore();
        const scoreRate = totalScore > 0 ? Math.round(gotScore / totalScore * 100) : 0;

        // 按题型统计
        const typeStats = {};
        questions.forEach(q => {
            const t = q.type;
            if (!typeStats[t]) typeStats[t] = { name: typeConfig[t]?.name || t, total: 0, got: 0, count: 0 };
            typeStats[t].total += q.score; typeStats[t].count++;
            if (q.type === 'composite') {
                let subGot = 0; q.subQuestions.forEach(sq => { if (sq.gotScore !== null) subGot += sq.gotScore; });
                typeStats[t].got += round(subGot);
            } else { typeStats[t].got += (q.gotScore !== null ? q.gotScore : 0); }
        });

        // 等级
        let level = '', lc = '', lb = '';
        if (scoreRate >= 90) { level = '优秀'; lc = 'text-green-600'; lb = 'bg-green-50 border-green-200'; }
        else if (scoreRate >= 80) { level = '良好'; lc = 'text-blue-600'; lb = 'bg-blue-50 border-blue-200'; }
        else if (scoreRate >= 70) { level = '中等'; lc = 'text-yellow-600'; lb = 'bg-yellow-50 border-yellow-200'; }
        else if (scoreRate >= 60) { level = '及格'; lc = 'text-orange-600'; lb = 'bg-orange-50 border-orange-200'; }
        else { level = '不及格'; lc = 'text-red-600'; lb = 'bg-red-50 border-red-200'; }

        // 排名
        const classScores = getMockClassScores(gotScore);
        const ct = classScores.length, rank = classScores.indexOf(gotScore) + 1;
        const avg = round(classScores.reduce((a, b) => a + b, 0) / ct);
        const max = classScores[0], median = classScores[Math.floor(ct / 2)];
        const beatRate = Math.round((ct - rank) / ct * 100);
        const diff = round(gotScore - avg);

        // 分数段
        const segs = [{l:'90-100',n:90,x:100,c:'bg-green-400'},{l:'80-89',n:80,x:89,c:'bg-blue-400'},{l:'70-79',n:70,x:79,c:'bg-cyan-400'},{l:'60-69',n:60,x:69,c:'bg-yellow-400'},{l:'0-59',n:0,x:59,c:'bg-red-400'}];
        segs.forEach(sg => { sg.cnt = classScores.filter(sc => sc >= sg.n && sc <= sg.x).length; sg.mine = gotScore >= sg.n && gotScore <= sg.x; });
        const segMax = Math.max(...segs.map(s => s.cnt), 1);

        // 薄弱/优势
        let weakType = null, weakRate = 100;
        Object.values(typeStats).forEach(ts => { const r = ts.total > 0 ? ts.got / ts.total * 100 : 0; if (r < weakRate) { weakRate = r; weakType = ts.name; } });
        const fullTypes = Object.values(typeStats).filter(ts => ts.total > 0 && ts.got >= ts.total).map(ts => ts.name);

        // 题型行
        const cta = getMockClassTypeAvg();
        const typeRows = Object.entries(typeStats).map(([k, ts]) => {
            const r = ts.total > 0 ? Math.round(ts.got / ts.total * 100) : 0, ar = cta[k] || 60, d = r - ar;
            const bc = r >= 80 ? 'bg-green-400' : r >= 60 ? 'bg-blue-400' : r >= 40 ? 'bg-yellow-400' : 'bg-red-400';
            const dt = d > 0 ? `<span class="text-green-600">+${d}%</span>` : d < 0 ? `<span class="text-red-500">${d}%</span>` : `<span class="text-gray-400">—</span>`;
            return `<div class="flex items-center gap-1.5 py-1.5">
                <span class="text-[11px] text-gray-600 w-12 shrink-0">${ts.name}</span>
                <div class="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden relative">
                    <div class="${bc} h-full rounded-full" style="width:${r}%"></div>
                    <div class="absolute top-0 h-full w-0.5 bg-gray-400" style="left:${ar}%"></div>
                </div>
                <span class="text-[10px] font-semibold text-gray-600 w-12 text-right">${round(ts.got)}/${ts.total}</span>
                <span class="text-[10px] w-8 text-right">${dt}</span>
            </div>`;
        }).join('');

        // 分数段行
        const segRows = segs.map(sg => {
            const w = Math.round(sg.cnt / segMax * 100);
            return `<div class="flex items-center gap-1.5 py-0.5">
                <span class="text-[10px] text-gray-500 w-9 shrink-0 text-right">${sg.l}</span>
                <div class="flex-1 h-3.5 bg-gray-50 rounded overflow-hidden flex items-center">
                    <div class="${sg.c} ${sg.mine ? 'ring-1 ring-offset-1 ring-blue-400' : ''} h-full rounded flex items-center justify-end pr-0.5" style="width:${Math.max(w, 10)}%">
                        <span class="text-[9px] text-white font-bold">${sg.cnt}</span>
                    </div>
                </div>
                ${sg.mine ? '<span class="text-[9px] text-blue-600 font-bold w-4">←</span>' : '<span class="w-4"></span>'}
            </div>`;
        }).join('');

        // 渲染到侧边栏
        const sidebar = document.getElementById('analysisSidebar');
        sidebar.innerHTML = `
            <div class="p-4 space-y-4">
                <!-- 标题 -->
                <div class="flex items-center gap-1.5 pb-3 border-b border-gray-100">
                    <i class="fas fa-chart-bar text-blue-500 text-sm"></i>
                    <span class="text-sm font-semibold text-gray-800">个人成绩分析</span>
                </div>

                <!-- 综合分析 -->
                <div>
                    <div class="text-xs font-semibold text-gray-700 mb-2 flex items-center gap-1"><i class="fas fa-lightbulb text-amber-400 text-[10px]"></i>综合分析</div>
                    <div class="space-y-1.5">
                        <div class="flex items-start gap-1.5 p-2 bg-indigo-50 rounded-lg border border-indigo-100">
                            <i class="fas fa-ranking-star text-indigo-500 mt-0.5 text-[10px]"></i>
                            <div class="text-[11px] text-indigo-700">排名第 ${rank}/${ct}，超越 ${beatRate}%。${diff >= 0 ? `高于均分 ${diff} 分。` : `低于均分 ${Math.abs(diff)} 分。`}</div>
                        </div>
                        ${fullTypes.length > 0 ? `<div class="flex items-start gap-1.5 p-2 bg-green-50 rounded-lg border border-green-100">
                            <i class="fas fa-check-circle text-green-500 mt-0.5 text-[10px]"></i>
                            <div class="text-[11px] text-green-700"><b>优势：</b>${fullTypes.join('、')}满分</div>
                        </div>` : ''}
                        ${weakType && weakRate < 60 ? `<div class="flex items-start gap-1.5 p-2 bg-red-50 rounded-lg border border-red-100">
                            <i class="fas fa-exclamation-triangle text-red-500 mt-0.5 text-[10px]"></i>
                            <div class="text-[11px] text-red-700"><b>薄弱：</b>${weakType}仅${Math.round(weakRate)}%，需加强</div>
                        </div>` : ''}
                        <div class="flex items-start gap-1.5 p-2 bg-blue-50 rounded-lg border border-blue-100">
                            <i class="fas fa-info-circle text-blue-500 mt-0.5 text-[10px]"></i>
                            <div class="text-[11px] text-blue-700">${gotScore}/${totalScore}（${scoreRate}%），「${level}」。${scoreRate >= 80 ? '表现优异。' : scoreRate >= 60 ? '部分题型需加强。' : '建议系统复习。'}</div>
                        </div>
                    </div>
                </div>

                <!-- 核心指标 -->
                <div>
                    <div class="text-xs font-semibold text-gray-700 mb-2 flex items-center gap-1"><i class="fas fa-bullseye text-rose-400 text-[10px]"></i>核心指标</div>
                    <div class="grid grid-cols-3 gap-2">
                    <div class="text-center p-2 rounded-lg ${lb} border">
                        <div class="text-xl font-bold ${lc}">${gotScore}</div>
                        <div class="text-[9px] text-gray-500">得分/${totalScore}</div>
                    </div>
                    <div class="text-center p-2 rounded-lg bg-indigo-50 border border-indigo-200">
                        <div class="text-xl font-bold text-indigo-600">${rank}<span class="text-xs">/${ct}</span></div>
                        <div class="text-[9px] text-gray-500">班级排名</div>
                    </div>
                    <div class="text-center p-2 rounded-lg bg-purple-50 border border-purple-200">
                        <div class="text-xl font-bold text-purple-600">${beatRate}<span class="text-xs">%</span></div>
                        <div class="text-[9px] text-gray-500">超越比例</div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="text-center p-2 rounded-lg bg-gray-50 border border-gray-200">
                        <div class="text-lg font-bold text-gray-700">${scoreRate}<span class="text-xs">%</span></div>
                        <div class="text-[9px] text-gray-500">得分率</div>
                    </div>
                    <div class="text-center p-2 rounded-lg ${lb} border">
                        <div class="text-lg font-bold ${lc}">${level}</div>
                        <div class="text-[9px] text-gray-500">成绩等级</div>
                    </div>
                    </div>
                </div>

                <!-- 班级对比 -->
                <div>
                    <div class="text-xs font-semibold text-gray-700 mb-2 flex items-center gap-1"><i class="fas fa-users text-indigo-400 text-[10px]"></i>班级对比</div>
                    <div class="grid grid-cols-2 gap-1.5 text-[11px]">
                        <div class="p-2 bg-gray-50 rounded-lg text-center">
                            <div class="text-gray-400 text-[10px]">班级平均</div>
                            <div class="font-bold text-gray-700">${avg}</div>
                        </div>
                        <div class="p-2 bg-gray-50 rounded-lg text-center">
                            <div class="text-gray-400 text-[10px]">与均分差</div>
                            <div class="font-bold ${diff >= 0 ? 'text-green-600' : 'text-red-500'}">${diff >= 0 ? '+' : ''}${diff}</div>
                        </div>
                        <div class="p-2 bg-gray-50 rounded-lg text-center">
                            <div class="text-gray-400 text-[10px]">最高分</div>
                            <div class="font-bold text-gray-700">${max}</div>
                        </div>
                        <div class="p-2 bg-gray-50 rounded-lg text-center">
                            <div class="text-gray-400 text-[10px]">中位数</div>
                            <div class="font-bold text-gray-700">${median}</div>
                        </div>
                    </div>
                </div>

                <!-- 题型得分 -->
                <div>
                    <div class="text-xs font-semibold text-gray-700 mb-2 flex items-center gap-1"><i class="fas fa-layer-group text-blue-400 text-[10px]"></i>各题型得分 <span class="text-[10px] text-gray-400 font-normal">(|为均值)</span></div>
                    <div class="bg-gray-50 rounded-lg p-2.5 border border-gray-100">${typeRows}</div>
                </div>

                <!-- 分数段分布 -->
                <div>
                    <div class="text-xs font-semibold text-gray-700 mb-2 flex items-center gap-1"><i class="fas fa-chart-column text-cyan-400 text-[10px]"></i>分数段分布 <span class="text-[10px] text-gray-400 font-normal">(${ct}人)</span></div>
                    <div class="bg-gray-50 rounded-lg p-2.5 border border-gray-100">${segRows}</div>
                </div>

                <!-- 考试信息 -->
                <div>
                    <div class="text-xs font-semibold text-gray-700 mb-2 flex items-center gap-1"><i class="fas fa-clock text-gray-400 text-[10px]"></i>考试信息</div>
                    <div class="grid grid-cols-2 gap-1.5 text-[11px]">
                        <div class="flex items-center gap-1.5 p-2 bg-gray-50 rounded-lg"><i class="fas fa-play-circle text-gray-400 text-[10px]"></i><span class="text-gray-500">开始</span><span class="ml-auto font-medium text-gray-700">${s.startTime || '--'}</span></div>
                        <div class="flex items-center gap-1.5 p-2 bg-gray-50 rounded-lg"><i class="fas fa-stop-circle text-gray-400 text-[10px]"></i><span class="text-gray-500">交卷</span><span class="ml-auto font-medium text-gray-700">${s.endTime || '--'}</span></div>
                        <div class="flex items-center gap-1.5 p-2 bg-gray-50 rounded-lg"><i class="fas fa-hourglass-half text-gray-400 text-[10px]"></i><span class="text-gray-500">用时</span><span class="ml-auto font-medium text-gray-700">${s.duration || '--'}</span></div>
                        <div class="flex items-center gap-1.5 p-2 bg-gray-50 rounded-lg"><i class="fas fa-sign-out-alt text-gray-400 text-[10px]"></i><span class="text-gray-500">离开</span><span class="ml-auto font-medium ${(s.leaveCount || 0) > 0 ? 'text-orange-600' : 'text-gray-700'}">${s.leaveCount || 0}次</span></div>
                    </div>
                </div>
            </div>`;
    }

    </script>

<!-- 附件预览模态框 -->
<div id="attachModal" class="attach-modal-mask" onclick="if(event.target===this)closeAttachModal()">
    <div class="attach-modal">
        <div class="attach-modal-header">
            <div class="flex items-center gap-2">
                <i class="fas fa-eye text-blue-500"></i>
                <span id="attachModalTitle" class="text-sm font-semibold text-gray-800">附件预览</span>
            </div>
            <button onclick="closeAttachModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="attachModalBody" class="attach-modal-body"></div>
    </div>
</div>

</body>
