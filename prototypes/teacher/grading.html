<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批阅试卷 - 教师端</title>
    <script src="assets/js/tailwind.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Liu+Jian+Mao+Cao&display=swap">
    <style>
        body { background: #f5f7fa; }
        /* 头像颜色池 */
        .avatar-color-0 { background: #22c55e; }
        .avatar-color-1 { background: #3b82f6; }
        .avatar-color-2 { background: #a855f7; }
        .avatar-color-3 { background: #f59e0b; }
        .avatar-color-4 { background: #ef4444; }
        .avatar-color-5 { background: #06b6d4; }
        .avatar-color-6 { background: #ec4899; }
        .avatar-color-7 { background: #8b5cf6; }
        /* 题目导航卡片 */
        .q-card { position: relative; width: 36px; display: flex; flex-direction: column; align-items: center; justify-content: center;
                  padding: 3px 2px; border-radius: 6px; cursor: pointer; transition: all 0.15s;
                  background: #f3f4f6; border: 1.5px solid #e5e7eb; gap: 1px; }
        .q-card:hover { background: #e5e7eb; transform: scale(1.05); }
        .q-card .q-num { font-size: 12px; font-weight: 600; color: #374151; line-height: 1; }
        .q-card .q-score { font-size: 9px; font-weight: 700; line-height: 1; }
        .q-card .q-score.s-full { color: #16a34a; }
        .q-card .q-score.s-zero { color: #dc2626; }
        .q-card .q-score.s-partial { color: #d97706; }
        .q-card .q-score.s-pending { color: #94a3b8; }
        /* 导航筛选 */
        .nav-filter-btn { transition: all 0.15s; }
        .nav-filter-btn.active { background: #3b82f6; color: #fff; }
        /* 题目区域 */
        .question-item { scroll-margin-top: 20px; }
        .question-item.highlight { animation: highlight 0.8s ease; }
        @keyframes highlight { 0%,100% { background: transparent; } 50% { background: #fef9c3; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        /* 得分条 */
        .score-strip { font-family: 'Liu Jian Mao Cao', cursive; font-weight: 400; font-size: 40px; color: #dc2626; }
        .score-strip.ungraded { font-family: inherit; font-size: 12px; background: #e0e7ff; color: #4f46e5; padding: 4px 10px; border-radius: 6px; }
        /* 内联批阅面板 */
        .grading-inline { border: 2px solid #93c5fd; border-radius: 8px; background: #eff6ff; }
        .grading-inline .gi-header { background: #dbeafe; border-radius: 6px 6px 0 0; }
        /* AI按钮科技感 */
        .ai-btn { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none;
                   padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
                   cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 8px rgba(99,102,241,0.3);
                   display: inline-flex; align-items: center; gap: 5px; }
        .ai-btn:hover { background: linear-gradient(135deg, #4f46e5, #7c3aed); box-shadow: 0 4px 14px rgba(99,102,241,0.45); transform: translateY(-1px); }
        .ai-btn:active { transform: translateY(0); }
        .ai-btn i { font-size: 11px; }
        /* 附件预览模态框 */
        .attach-modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
        .attach-modal-mask.show { opacity: 1; pointer-events: auto; }
        .attach-modal { background: #fff; border-radius: 12px; max-width: 720px; width: 92%; max-height: 85vh; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); transform: scale(0.92); transition: transform 0.25s; }
        .attach-modal-mask.show .attach-modal { transform: scale(1); }
        .attach-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #e5e7eb; }
        .attach-modal-body { padding: 20px; overflow-y: auto; max-height: calc(85vh - 60px); }
        .attach-modal-body img { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <!-- 顶部信息栏 -->
    <header class="bg-white border-b border-gray-200 px-5 py-3 shrink-0">
        <div class="flex items-center justify-between">
            <!-- 左：返回 + 考试名称 + 基础信息 -->
            <div class="flex items-center space-x-3 min-w-0">
                <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg shrink-0 transition">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="min-w-0">
                    <div class="flex items-center space-x-2">
                        <h1 class="font-semibold text-gray-900 text-base truncate" id="examTitle">大学英语期末考试</h1>
                        <span class="shrink-0 px-1.5 py-0.5 text-[10px] font-medium rounded bg-yellow-100 text-yellow-700" id="examStatus">进行中</span>
                        <span class="shrink-0 px-1.5 py-0.5 text-[10px] font-medium rounded bg-blue-100 text-blue-700">AI批阅</span>
                        <span class="shrink-0 px-1.5 py-0.5 text-[10px] font-medium rounded bg-purple-100 text-purple-700">AI评语</span>
                    </div>
                    <div class="flex items-center text-xs text-gray-500 mt-1 space-x-3">
                        <span id="examPaperNo"><i class="far fa-file-alt mr-1"></i>No. EX-2026012001</span>
                        <span class="text-gray-300">|</span>
                        <span id="examPaper"><i class="far fa-copy mr-1"></i>大学英语期末试卷A<span class="text-gray-300 mx-1">|</span><span class="text-gray-400">抽题</span></span>
                        <span class="text-gray-300">|</span>
                        <span id="examTime"><i class="far fa-clock mr-1"></i>2026-01-20 09:00 ~ 2026-01-20 11:00</span>
                        <span class="text-gray-300">|</span>
                        <span id="examDeadline"><i class="far fa-calendar-check mr-1"></i>批阅截止: 2026-02-04 18:00</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 学生信息条（固定在顶部） -->
    <div class="shrink-0 bg-white border-b border-gray-200 px-5 py-2" id="studentInfoBar"></div>

    <div class="flex-1 flex overflow-hidden">
        <!-- 左侧：题卡导航 -->
        <div class="w-60 border-r border-gray-200 p-2.5 overflow-y-auto shrink-0 bg-white flex flex-col">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs font-medium text-gray-500">题目导航</span>
                <span class="text-xs text-gray-400">总分 <span class="font-bold text-red-600" id="navTotalScore">--</span></span>
            </div>
            <!-- 导航筛选 -->
            <div class="flex items-center gap-1 mb-2.5" id="navFilterBar">
                <button onclick="filterNav('all')" class="nav-filter-btn active text-xs px-2 py-1 rounded-md bg-gray-100 text-gray-500" data-nf="all">全部</button>
                <button onclick="filterNav('pending')" class="nav-filter-btn text-xs px-2 py-1 rounded-md bg-gray-100 text-gray-500" data-nf="pending">未批</button>
            </div>
            <div id="questionNav" class="flex-1 overflow-y-auto"></div>
        </div>
        <!-- 中间：试卷内容 -->
        <div class="flex-1 overflow-y-auto p-6 bg-gray-50" id="paperScroll">
            <!-- 题目列表 -->
            <div class="max-w-6xl mx-auto" id="questionList"></div>
        </div>
        <!-- 右侧：成绩分析面板（仅 completed 状态显示） -->
        <div class="w-80 border-l border-gray-200 overflow-y-auto shrink-0 bg-white hidden" id="analysisSidebar"></div>
    </div>

    <script>
    // 状态
    let navFilter = 'all';
    let currentStudentId = null;
    let currentStudent = null;
    let questions = [];
    let gradingData = {};
    let gradingQueue = [];
    let gradingQueueIndex = 0;
    let gradingStats = { total: 0, graded: 0, remaining: 0 };

    // 从URL获取参数
    const urlParams = new URLSearchParams(window.location.search);
    currentStudentId = urlParams.get('studentId') || 's1';
    const examStatus = urlParams.get('examStatus') || 'in_progress';
    const studentStatus = urlParams.get('studentStatus') || '';

    // 题型配置
    const typeConfig = {
        single: { name: '单选题', icon: 'fa-circle-dot', color: 'cyan' },
        multiple: { name: '多选题', icon: 'fa-check-double', color: 'purple' },
        judge: { name: '判断题', icon: 'fa-scale-balanced', color: 'indigo' },
        fill: { name: '填空题', icon: 'fa-pen-line', color: 'orange' },
        cloze: { name: '完形填空', icon: 'fa-puzzle-piece', color: 'amber' },
        essay: { name: '简答题', icon: 'fa-align-left', color: 'green' },
        composite: { name: '复合题', icon: 'fa-layer-group', color: 'blue' }
    };

    // 快捷评语
    const quickPhrases = [
        '回答完整，逻辑清晰',
        '理解正确，表达准确',
        '思路清晰，但细节需完善',
        '基本正确，但有小错误',
        '理解有偏差，需加强学习',
        '答案不完整',
        '未回答要点'
    ];

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
        loadMockData();
        // completed 状态：所有 essay 题赋分、隐藏未批筛选、显示分析面板
        if (examStatus === 'completed') {
            assignAllEssayScores();
            document.getElementById('navFilterBar').innerHTML =
                '<button class="nav-filter-btn active text-xs px-2 py-1 rounded-md bg-gray-100 text-gray-500" data-nf="all">全部</button>';
            document.getElementById('analysisSidebar').classList.remove('hidden');
        } else if (studentStatus === 'graded') {
            assignAllEssayScores();
        }
        renderStudentInfoBar();
        renderQuestionNav();
        renderPaper();
        updateStats();
        if (examStatus === 'completed') renderAnalysisSidebar();
    });

    // 加载模拟数据
    function loadMockData() {
        // 当前考生数据（根据studentId匹配，这里用mock）
        const allStudents = {
            's1':  { id: 's1',  name: '张三',   username: 'zhangsan',   phone: '138****1001', studentId: '20260001', status: 'pending', score: 0,  examCount: 1, startTime: '2026-01-20 09:02', endTime: '2026-01-20 10:35', duration: '93分钟', leaveCount: 0 },
            's2':  { id: 's2',  name: '李四',   username: 'lisi',       phone: '139****2002', studentId: '20260002', status: 'graded',  score: 85, examCount: 2, startTime: '2026-01-20 09:00', endTime: '2026-01-20 10:48', duration: '108分钟', leaveCount: 1 },
            's3':  { id: 's3',  name: '王五',   username: 'wangwu',     phone: '137****3003', studentId: '20260003', status: 'pending', score: 0,  examCount: 1, startTime: '2026-01-20 09:05', endTime: '2026-01-20 10:52', duration: '107分钟', leaveCount: 0 },
            's4':  { id: 's4',  name: '赵六',   username: 'zhaoliu',    phone: '136****4004', studentId: '20260004', status: 'grading', score: 0,  examCount: 1, startTime: '2026-01-20 09:01', endTime: '2026-01-20 10:40', duration: '99分钟', leaveCount: 2 },
            'stu_1': { id: 'stu_1', name: '张三', username: 'user_20260001', phone: '13800001000', studentId: '20260001', status: 'pending', score: 0, examCount: 1, startTime: '2026-01-15 08:00', endTime: '2026-01-15 09:12', duration: '72分钟', leaveCount: 1 },
            'stu_2': { id: 'stu_2', name: '李四', username: 'user_20260002', phone: '13800001037', studentId: '20260002', status: 'pending', score: 0, examCount: 1, startTime: '2026-01-15 08:04', endTime: '2026-01-15 09:30', duration: '86分钟', leaveCount: 0 },
        };
        currentStudent = allStudents[currentStudentId] || allStudents['s1'];
        currentStudentId = currentStudent.id;

        // 考生队列（根据考试状态区分）
        if (examStatus === 'completed') {
            // 已完成：所有考生均可浏览
            gradingQueue = Object.values(allStudents).map(s => ({
                id: s.id, name: s.name, status: 'graded'
            }));
            gradingStats = { total: 24, graded: 24, remaining: 0 };
        } else {
            // 批阅中：仅待批阅考生
            gradingQueue = [
                { id: 's1', name: '张三', status: 'pending' },
                { id: 's3', name: '王五', status: 'pending' },
                { id: 's4', name: '赵六', status: 'pending' },
                { id: 'stu_1', name: '张三', status: 'pending' },
                { id: 'stu_2', name: '李四', status: 'pending' },
            ];
            gradingStats = { total: 24, graded: 8, remaining: 16 };
        }
        // 标记当前考生在队列中的位置
        gradingQueueIndex = Math.max(0, gradingQueue.findIndex(s => s.id === currentStudentId));

        // 试卷题目数据 —— 大学英语期末考试（满分105分）
        questions = [
            // ===== 一、单选题（每题2分，共40分）=====
            { id: 'q1', type: 'single', num: 1, content: 'The teacher suggested that each student ______ a plan for the summer vacation.', score: 2,
              options: [{l:'A',t:'make'},{l:'B',t:'makes'},{l:'C',t:'made'},{l:'D',t:'making'}],
              correct: 'A', answer: 'A', gotScore: 2, explanation: 'suggest引导的宾语从句用虚拟语气，should + 动词原形，should可省略' },
            { id: 'q2', type: 'single', num: 2, content: 'It was not until midnight ______ the noise of the street stopped.', score: 2,
              options: [{l:'A',t:'that'},{l:'B',t:'which'},{l:'C',t:'when'},{l:'D',t:'as'}],
              correct: 'A', answer: 'C', gotScore: 0, explanation: '强调句型 It was not until...that...，此处that不可替换为when' },
            { id: 'q3', type: 'single', num: 3, content: 'Neither the students nor the teacher ______ satisfied with the result.', score: 2,
              options: [{l:'A',t:'is'},{l:'B',t:'are'},{l:'C',t:'were'},{l:'D',t:'was'}],
              correct: 'D', answer: 'D', gotScore: 2, explanation: 'neither...nor...就近原则，the teacher为单数，且过去时态用was' },
            { id: 'q4', type: 'single', num: 4, content: 'The number of people who ______ cars ______ increasing.', score: 2,
              options: [{l:'A',t:'owns; are'},{l:'B',t:'owns; is'},{l:'C',t:'own; is'},{l:'D',t:'own; are'}],
              correct: 'C', answer: 'C', gotScore: 2, explanation: 'who指代people用复数own；the number of作主语谓语用单数is' },
            { id: 'q5', type: 'single', num: 5, content: 'She has a great deal of trouble ______ the work on time.', score: 2,
              options: [{l:'A',t:'to finish'},{l:'B',t:'finishing'},{l:'C',t:'finished'},{l:'D',t:'finish'}],
              correct: 'B', answer: 'A', gotScore: 0, explanation: 'have trouble (in) doing sth. 是固定搭配，用动名词' },
            { id: 'q6', type: 'single', num: 6, content: '______ from the top of the tower, the city looks magnificent.', score: 2,
              options: [{l:'A',t:'Seeing'},{l:'B',t:'Having seen'},{l:'C',t:'Seen'},{l:'D',t:'To see'}],
              correct: 'C', answer: 'C', gotScore: 2, explanation: 'the city与see是被动关系，用过去分词Seen作状语' },
            { id: 'q7', type: 'single', num: 7, content: 'I would rather you ______ tomorrow than today.', score: 2,
              options: [{l:'A',t:'come'},{l:'B',t:'came'},{l:'C',t:'will come'},{l:'D',t:'had come'}],
              correct: 'B', answer: 'B', gotScore: 2, explanation: 'would rather后接从句用虚拟语气，表将来用一般过去时' },
            { id: 'q8', type: 'single', num: 8, content: 'The manager, as well as his colleagues, ______ to attend the conference.', score: 2,
              options: [{l:'A',t:'are going'},{l:'B',t:'is going'},{l:'C',t:'were going'},{l:'D',t:'have been going'}],
              correct: 'B', answer: 'A', gotScore: 0, explanation: 'as well as连接主语时，谓语与前面的主语the manager一致，用单数' },
            { id: 'q9', type: 'single', num: 9, content: 'By the time you arrive, I ______ for two hours.', score: 2,
              options: [{l:'A',t:'will study'},{l:'B',t:'will have been studying'},{l:'C',t:'studied'},{l:'D',t:'am studying'}],
              correct: 'B', answer: 'B', gotScore: 2, explanation: 'by the time引导的时间状语从句，主句用将来完成进行时表持续' },
            { id: 'q10', type: 'single', num: 10, content: 'There is no point ______ with him about this matter.', score: 2,
              options: [{l:'A',t:'to argue'},{l:'B',t:'arguing'},{l:'C',t:'of arguing'},{l:'D',t:'to arguing'}],
              correct: 'B', answer: 'B', gotScore: 2, explanation: 'There is no point (in) doing sth. 做某事没有意义' },
            { id: 'q11', type: 'single', num: 11, content: 'Only when he returned ______ the truth.', score: 2,
              options: [{l:'A',t:'he knew'},{l:'B',t:'did he know'},{l:'C',t:'he did know'},{l:'D',t:'knew he'}],
              correct: 'B', answer: 'B', gotScore: 2, explanation: 'Only + 状语从句置于句首，主句用部分倒装' },
            { id: 'q12', type: 'single', num: 12, content: 'He insisted that the meeting ______ put off.', score: 2,
              options: [{l:'A',t:'be'},{l:'B',t:'was'},{l:'C',t:'is'},{l:'D',t:'would be'}],
              correct: 'A', answer: 'B', gotScore: 0, explanation: 'insist表"坚持要求"时，从句用虚拟语气(should) + 动词原形' },
            { id: 'q13', type: 'single', num: 13, content: 'The book ______ on the table belongs to my sister.', score: 2,
              options: [{l:'A',t:'lying'},{l:'B',t:'lain'},{l:'C',t:'laying'},{l:'D',t:'laid'}],
              correct: 'A', answer: 'A', gotScore: 2, explanation: 'lie(躺)的现在分词lying作后置定语修饰book' },
            { id: 'q14', type: 'single', num: 14, content: 'Not only ______ the book, but also he remembered what he had read.', score: 2,
              options: [{l:'A',t:'he read'},{l:'B',t:'did he read'},{l:'C',t:'he did read'},{l:'D',t:'had he read'}],
              correct: 'B', answer: 'B', gotScore: 2, explanation: 'Not only置于句首，前半句用部分倒装' },
            { id: 'q15', type: 'single', num: 15, content: 'It is high time that we ______ action to protect the environment.', score: 2,
              options: [{l:'A',t:'take'},{l:'B',t:'took'},{l:'C',t:'have taken'},{l:'D',t:'will take'}],
              correct: 'B', answer: 'A', gotScore: 0, explanation: 'It is high time that... 后用一般过去时表虚拟' },
            { id: 'q16', type: 'single', num: 16, content: '______ had I reached the station ______ the train left.', score: 2,
              options: [{l:'A',t:'Hardly; when'},{l:'B',t:'Hardly; than'},{l:'C',t:'No sooner; when'},{l:'D',t:'Scarcely; than'}],
              correct: 'A', answer: 'C', gotScore: 0, explanation: 'Hardly/Scarcely...when... 或 No sooner...than...，注意搭配' },
            { id: 'q17', type: 'single', num: 17, content: 'The reason ______ he was absent was ______ he was ill.', score: 2,
              options: [{l:'A',t:'why; that'},{l:'B',t:'that; because'},{l:'C',t:'why; because'},{l:'D',t:'that; that'}],
              correct: 'A', answer: 'A', gotScore: 2, explanation: 'the reason why... was that... 是固定句型' },
            { id: 'q18', type: 'single', num: 18, content: 'She pretended ______ me when I passed by.', score: 2,
              options: [{l:'A',t:'not to see'},{l:'B',t:'not seeing'},{l:'C',t:'to not see'},{l:'D',t:'having not seen'}],
              correct: 'A', answer: 'A', gotScore: 2, explanation: 'pretend后接不定式，否定形式为not to do' },
            { id: 'q19', type: 'single', num: 19, content: 'The house ______ roof was damaged has now been repaired.', score: 2,
              options: [{l:'A',t:'which'},{l:'B',t:'whose'},{l:'C',t:'that'},{l:'D',t:'of which'}],
              correct: 'B', answer: 'B', gotScore: 2, explanation: 'whose引导定语从句，表示所属关系' },
            { id: 'q20', type: 'single', num: 20, content: 'So absorbed ______ in her work that she forgot to eat lunch.', score: 2,
              options: [{l:'A',t:'she was'},{l:'B',t:'was she'},{l:'C',t:'she had been'},{l:'D',t:'had she been'}],
              correct: 'B', answer: 'B', gotScore: 2, explanation: 'So + adj. 置于句首，主句用部分倒装' },
            // ===== 二、多选题（每题3分，共45分）=====
            { id: 'q21', type: 'multiple', num: 21, content: 'Which of the following sentences use the subjunctive mood correctly?', score: 3,
              options: [{l:'A',t:'If I were you, I would accept the offer.'},{l:'B',t:'I wish I can fly.'},{l:'C',t:'It is essential that he be present.'},{l:'D',t:'I suggest that she goes home.'}],
              correct: ['A','C'], answer: ['A','C'], gotScore: 3, explanation: 'A用were表虚拟；C用be表虚拟。B应为could；D应为go' },
            { id: 'q22', type: 'multiple', num: 22, content: 'Which of the following words can function as both a noun and a verb?', score: 3,
              options: [{l:'A',t:'record'},{l:'B',t:'beautiful'},{l:'C',t:'increase'},{l:'D',t:'export'}],
              correct: ['A','C','D'], answer: ['A','C'], gotScore: 0, explanation: 'record/increase/export均可作名词和动词；beautiful只能作形容词' },
            { id: 'q23', type: 'multiple', num: 23, content: 'Which of the following are correct passive voice sentences?', score: 3,
              options: [{l:'A',t:'The book was written by Mark Twain.'},{l:'B',t:'The window has been broken.'},{l:'C',t:'He was happened to be there.'},{l:'D',t:'The letter is being typed now.'}],

    // completed 状态下，给所有未评分的 essay 题赋模拟分数
    function assignAllEssayScores() {
        const mockScores = { q62: 3, q63: 4, q64: 4, q65: 3, q66: 4, q67_5: 5, q68_4: 4 };
        const mockComments = {
            q62: '基本理解了核心区别，但特殊用法未提及',
            q63: '举例恰当，缺少语法差异深入分析',
            q64: '表达流畅，内容完整，逻辑清晰',
            q65: '三种条件句描述准确，例句正确',
            q66: '找出大部分错误，遗漏不可数名词问题',
            q67_5: '论述充分，有理有据',
            q68_4: '观点明确，论证合理'
        };
        questions.forEach(q => {
            if (q.type === 'essay' && q.gotScore === null) {
                q.gotScore = mockScores[q.id] || Math.round(q.score * 0.7);
                gradingData[q.id] = { score: q.gotScore, comment: mockComments[q.id] || '回答基本正确', aiScore: null, aiComment: '' };
            } else if (q.type === 'composite') {
                q.subQuestions.forEach(sq => {
                    if (sq.type === 'essay' && sq.gotScore === null) {
                        sq.gotScore = mockScores[sq.id] || Math.round(sq.score * 0.7);
                        gradingData[sq.id] = { score: sq.gotScore, comment: mockComments[sq.id] || '回答基本正确', aiScore: null, aiComment: '' };
                    }
                });
                // 更新复合题总分
                let total = 0;
                q.subQuestions.forEach(sq => { total += (sq.gotScore || 0); });
                q.gotScore = round(total);
            }
        });
    }

    // 获取头像颜色索引
    function getAvatarColorIndex(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
            hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }
        return Math.abs(hash) % 8;
    }
