<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师登录 - 考试系统</title>
    <script src="assets/js/tailwind.min.js"></script>
    <link rel="stylesheet" href="assets/css/fontawesome.min.css">
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        body {
            background: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: float 20s ease-in-out infinite;
        }
        .login-card {
            animation: fadeIn 0.6s ease-out;
            position: relative;
            z-index: 10;
        }
        .input-focus {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-focus:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <!-- 登录卡片 -->
    <div class="login-card bg-white rounded-3xl shadow-2xl w-full max-w-md p-10 backdrop-blur-sm">
        <!-- Logo 和标题 -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-green-400 via-green-500 to-green-600 rounded-2xl mb-6 shadow-xl transform hover:scale-110 transition-transform duration-300">
                <i class="fas fa-chalkboard-teacher text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-green-600 to-green-500 bg-clip-text text-transparent mb-2">教师工作台</h1>
            <p class="text-gray-500 text-base">欢迎回来，请登录您的账号</p>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" class="space-y-5">
            <!-- 工号/手机号 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-user text-gray-400 mr-2"></i>工号/手机号
                </label>
                <input
                    type="text"
                    id="username"
                    class="input-focus w-full px-4 py-3.5 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 transition"
                    placeholder="请输入工号或手机号"
                    required
                >
            </div>

            <!-- 密码 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-lock text-gray-400 mr-2"></i>密码
                </label>
                <div class="relative">
                    <input
                        type="password"
                        id="password"
                        class="input-focus w-full px-4 py-3.5 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 transition pr-12"
                        placeholder="请输入密码"
                        required
                    >
                    <button
                        type="button"
                        id="togglePassword"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                    >
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- 记住登录 & 忘记密码 -->
            <div class="flex items-center justify-between">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-green-600 border-gray-300 rounded focus:ring-green-500">
                    <span class="ml-2 text-sm text-gray-600">记住登录状态</span>
                </label>
                <a href="#" class="text-sm text-green-600 hover:text-green-700 font-medium">忘记密码?</a>
            </div>

            <!-- 登录按钮 -->
            <button
                type="submit"
                class="w-full bg-gradient-to-r from-green-500 via-green-600 to-green-500 text-white py-3.5 rounded-xl font-semibold hover:from-green-600 hover:via-green-700 hover:to-green-600 transition-all duration-300 shadow-lg hover:shadow-xl transform hover:scale-[1.02]"
            >
                <i class="fas fa-sign-in-alt mr-2"></i>登录
            </button>
        </form>

        <!-- 底部提示 -->
        <div class="mt-6 text-center text-sm text-gray-500">
            <p>首次登录? 请联系管理员获取账号</p>
        </div>
    </div>

    <script>
        // 密码显示/隐藏切换
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            // 原型阶段:简单验证
            if (username && password) {
                // 保存登录状态
                const teacherInfo = {
                    id: 'teacher_001',
                    name: '王老师',
                    workNo: username,
                    loginTime: new Date().toISOString(),
                    remember: remember
                };

                if (remember) {
                    localStorage.setItem('teacherInfo', JSON.stringify(teacherInfo));
                } else {
                    sessionStorage.setItem('teacherInfo', JSON.stringify(teacherInfo));
                }

                // 跳转到工作台
                window.location.href = 'dashboard.html';
            }
        });

        // 检查是否已登录
        window.addEventListener('DOMContentLoaded', function() {
            const savedInfo = localStorage.getItem('teacherInfo') || sessionStorage.getItem('teacherInfo');
            if (savedInfo) {
                const info = JSON.parse(savedInfo);
                // 检查登录时间是否在7天内
                const loginTime = new Date(info.loginTime);
                const now = new Date();
                const daysDiff = (now - loginTime) / (1000 * 60 * 60 * 24);

                if (daysDiff < 7) {
                    // 自动跳转
                    window.location.href = 'dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
